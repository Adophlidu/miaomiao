user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /run/nginx.pid;

events { worker_connections 1024; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;

  server {
    listen 80 default_server;
    server_name _;
    root /opt/miaomiao/web;
    index index.html;

    # API + auth → Node server on :3000 (same origin as the SPA)
    location /trpc/ { proxy_pass http://127.0.0.1:3000; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $remote_addr; }
    location /api/  { proxy_pass http://127.0.0.1:3000; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $remote_addr; }

    # SPA: serve static assets, fall back to index.html for client routes
    location / { try_files $uri $uri/ /index.html; }
  }
}
