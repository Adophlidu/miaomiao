version: 1
# Amplify Hosting build spec for the web SPA (apps/web). Set VITE_SERVER_URL as an
# Amplify environment variable (the App Runner HTTPS URL). SPA routing also needs a
# rewrite rule: 200-redirect everything that isn't a file to /index.html (see deploy/aws-deploy.md).
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - pnpm install --frozen-lockfile
    build:
      commands:
        - pnpm --filter web build
  artifacts:
    baseDirectory: apps/web/dist
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
